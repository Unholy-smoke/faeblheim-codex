site_name: Faeblheim Codex 2.0
docs_dir: .
site_dir: ../_site_faeblheim
theme:
  name: material
  palette:
    scheme: slate
  features:
    - navigation.sections
    # Do NOT set navigation.expand so sections stay collapsed by default
extra_css:
  - stylesheets/dark-mode.css
plugins:
  - search
  - awesome-pages:
      collapse_single_pages: true
  - roamlinks
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
# No explicit 'nav:' needed — awesome-pages + .pages drive the tree.
